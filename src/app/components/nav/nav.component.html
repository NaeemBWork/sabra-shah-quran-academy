<!-- Desktop Top Navigation -->
<nav
  class="hidden md:block fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md shadow-sm border-b border-andalusian-gold/20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <a routerLink="/" class="flex items-center space-x-3 group">
        <img src="/assets/logo-transparent.png" alt="Sabra Shah Quran Academy"
          class="h-12 w-auto transition-transform duration-300 group-hover:scale-105" />
        <div class="hidden sm:block">
          <h1 class="text-xl font-semibold text-andalusian-deep-blue">Sabra Shah</h1>
          <p class="text-sm text-andalusian-warm-brown">Quran Academy</p>
        </div>
      </a>

      <!-- Desktop Navigation -->
      <div class="flex items-center space-x-1">
        <a routerLink="/" routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
          [routerLinkActiveOptions]="{exact: true}"
          class="px-4 py-2 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream">
          Home
        </a>
        <a routerLink="/about" routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
          class="px-4 py-2 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream">
          About
        </a>
        <a routerLink="/donate" routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
          class="px-4 py-2 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream">
          Donate
        </a>
        <a routerLink="/trustees" routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
          class="px-4 py-2 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream">
          Trustees
        </a>
        <a routerLink="/contact" routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
          class="px-4 py-2 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream">
          Contact
        </a>
      </div>
    </div>
  </div>
</nav>
