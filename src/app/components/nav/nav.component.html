<nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md shadow-sm border-b border-andalusian-gold/20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <a routerLink="/" class="flex items-center space-x-3 group">
        <img 
          src="/assets/logo-transparent.png" 
          alt="Sabra Shah Quran Academy" 
          class="h-12 w-auto transition-transform duration-300 group-hover:scale-105"
        />
        <div class="hidden sm:block">
          <h1 class="text-xl font-semibold text-andalusian-deep-blue">Sabra Shah</h1>
          <p class="text-sm text-andalusian-warm-brown">Quran Academy</p>
        </div>
      </a>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-1">
        <a 
          routerLink="/" 
          routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
          [routerLinkActiveOptions]="{exact: true}"
          class="px-4 py-2 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream"
        >
          Home
        </a>
        <a 
          routerLink="/about" 
          routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
          class="px-4 py-2 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream"
        >
          About
        </a>
        <a 
          routerLink="/donate" 
          routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
          class="px-4 py-2 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream"
        >
          Donate
        </a>
        <a 
          routerLink="/trustees" 
          routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
          class="px-4 py-2 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream"
        >
          Trustees
        </a>
        <a 
          routerLink="/contact" 
          routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
          class="px-4 py-2 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream"
        >
          Contact
        </a>
      </div>

      <!-- Mobile Menu Button -->
      <button 
        (click)="toggleMenu()"
        class="md:hidden p-2 rounded-lg text-andalusian-deep-blue hover:bg-andalusian-cream transition-colors"
        aria-label="Toggle menu"
      >
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Mobile Navigation -->
    <div 
      *ngIf="isMenuOpen"
      class="md:hidden pb-4 border-t border-andalusian-gold/20 mt-2 pt-4"
    >
      <a 
        routerLink="/" 
        (click)="closeMenu()"
        routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
        [routerLinkActiveOptions]="{exact: true}"
        class="block px-4 py-3 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream mb-2"
      >
        Home
      </a>
      <a 
        routerLink="/about" 
        (click)="closeMenu()"
        routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
        class="block px-4 py-3 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream mb-2"
      >
        About
      </a>
      <a 
        routerLink="/donate" 
        (click)="closeMenu()"
        routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
        class="block px-4 py-3 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream mb-2"
      >
        Donate
      </a>
      <a 
        routerLink="/trustees" 
        (click)="closeMenu()"
        routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
        class="block px-4 py-3 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream mb-2"
      >
        Trustees
      </a>
      <a 
        routerLink="/contact" 
        (click)="closeMenu()"
        routerLinkActive="bg-andalusian-gold/10 text-andalusian-gold"
        class="block px-4 py-3 rounded-lg text-andalusian-deep-blue font-medium transition-colors duration-200 hover:bg-andalusian-cream"
      >
        Contact
      </a>
    </div>
  </div>
</nav>
